name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      ipxe_repo:
        description: 'iPXE 仓库'
        required: true
        default: 'ipxe/ipxe'

      autoexec_path:
        description: 'autoexec.ipxe 在仓库中的路径'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: pcbios
            builder_arch: x86_64
            output_dir: bin-x86_64-pcbios

    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.builder_arch }}
      options: --user root

    env:
      IPXE_SRC_DIR: ipxe-source
      AUTOEXEC_SRC_DIR: autoexec-config

    steps:
      - name: 检出 iPXE 源码
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          fetch-depth: 0
          path: ${{ env.IPXE_SRC_DIR }}

      - name: 检出 autoexec.ipxe
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          path: ${{ env.AUTOEXEC_SRC_DIR }}
          fetch-depth: 0

      - name: 准备 autoexec.ipxe
        working-directory: ${{ env.AUTOEXEC_SRC_DIR }}
        run: |
          echo "当前工作目录: $(pwd)"
          
          CUSTOM_AUTOEXEC_PATH="${{ env.AUTOEXEC_SRC_DIR }}/${{ inputs.autoexec_path }}"
          echo "尝试访问文件: ${CUSTOM_AUTOEXEC_PATH}"
          
          if [ -f "${CUSTOM_AUTOEXEC_PATH}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "${CUSTOM_AUTOEXEC_PATH}" ${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la ../${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '${CUSTOM_AUTOEXEC_PATH}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: ${{ env.IPXE_SRC_DIR }}/src
        run: |
          make clean
          make EMBED=${{ inputs.autoexec_path }} \
               ${{ matrix.output_dir }}/undionly.kpxe \
               ${{ matrix.output_dir }}/ipxe.pxe

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-${{ matrix.arch }}-${{ matrix.target }}
          path: |
            ${{ env.IPXE_SRC_DIR }}/src/${{ matrix.output_dir }}/*.kpxe
            ${{ env.IPXE_SRC_DIR }}/src/${{ matrix.output_dir }}/*.pxe
            ${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
