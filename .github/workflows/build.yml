name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      ipxe_repo:
        description: 'iPXE 仓库'
        required: true
        default: 'ipxe/ipxe'

      autoexec_path:
        description: 'autoexec.ipxe 在仓库中的路径'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: pcbios
            builder_arch: x86_64
            output_dir: bin-x86_64-pcbios

    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.builder_arch }}
      options: --user root

    env:
      IPXE_SRC_DIR: ipxe-source
      AUTOEXEC_SRC_DIR: autoexec-config

    steps:
      - name: 创建工作目录
        working-directory: /
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          ls -la /

      - name: 检出 autoexec.ipxe
        uses: actions/checkout@master
        with:
          working-directory: /workdir/${{ env.AUTOEXEC_SRC_DIR }}
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          fetch-depth: 0

      - name: 检出 iPXE 源码
        uses: actions/checkout@master
        with:
          working-directory: /workdir/${{ env.IPXE_SRC_DIR }}
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          fetch-depth: 1

      - name: 准备 autoexec.ipxe
        working-directory: /workdir/${{ env.AUTOEXEC_SRC_DIR }}
        run: |
          cd /workdir/${{ env.IPXE_SRC_DIR }}
          echo "当前工作目录: $(pwd)"
          ls -la
          cd /workdir/${{ env.AUTOEXEC_SRC_DIR }}
          echo "当前工作目录: $(pwd)"
          ls -la
          echo "尝试访问文件: /workdir/${{ env.AUTOEXEC_SRC_DIR }}/${{ inputs.autoexec_path }}"
          
          if [ -f "/workdir/${{ env.AUTOEXEC_SRC_DIR }}/${{ inputs.autoexec_path }}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "/workdir/${{ env.AUTOEXEC_SRC_DIR }}/${{ inputs.autoexec_path }}" /workdir/${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la /workdir/${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '/workdir/${{ env.AUTOEXEC_SRC_DIR }}/${{ inputs.autoexec_path }}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: /workdir/${{ env.IPXE_SRC_DIR }}/src
        run: |
          echo "当前工作目录: $(pwd)"
          make clean
          make EMBED=${{ inputs.autoexec_path }} \
               ${{ matrix.output_dir }}/undionly.kpxe \
               ${{ matrix.output_dir }}/ipxe.pxe

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          working-directory: /workdir/${{ env.IPXE_SRC_DIR }}/src
          name: ipxe-${{ matrix.arch }}-${{ matrix.target }}
          path: |
            ${{ matrix.output_dir }}/*.kpxe
            ${{ matrix.output_dir }}/*.pxe
            ${{ inputs.autoexec_path }}

      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: 移除老的 Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
