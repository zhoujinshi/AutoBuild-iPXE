name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      autoexec_path:
        description: '需要启动执行的脚本'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64

    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.arch }}
      options: --user root

    env:
      bindir: bin
      
    steps:
      - name: 创建工作目录
        working-directory: /
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          ls -la /

      - name: 检出 autoexec.ipxe
        uses: actions/checkout@v4
        with:
          path: autoexec-config
          repository: zhoujinshi/ipxe
          ref: master
          fetch-depth: 0

      - name: 检出 iPXE 源码
        uses: actions/checkout@v4
        with:
          path: ipxe-source
          repository: ipxe/ipxe
          ref: master
          fetch-depth: 0

      - name: 复制代码到工作目录
        run: |
          cp -r autoexec-config /workdir/
          cp -r ipxe-source /workdir/
          ls -la /workdir/

      - name: 准备 autoexec.ipxe
        working-directory: /workdir/autoexec-config
        run: |
          cd /workdir/ipxe-source
          echo "当前工作目录: $(pwd)"
          ls -la
          cd /workdir/autoexec-config
          echo "当前工作目录: $(pwd)"
          ls -la
          echo "尝试访问文件: /workdir/autoexec-config/${{ inputs.autoexec_path }}"
          
          if [ -f "/workdir/autoexec-config/${{ inputs.autoexec_path }}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "/workdir/autoexec-config/${{ inputs.autoexec_path }}" /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '/workdir/autoexec-config/${{ inputs.autoexec_path }}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: /workdir/ipxe-source/src
        run: |
          echo "当前工作目录: $(pwd)"
          make clean
          
          # NFS protocol support
          sed -i 's/\/\/#define\ DOWNLOAD_PROTO_NFS/#define\ DOWNLOAD_PROTO_NFS/' config/general.h
          
          # ping cmd support
          sed -i 's/\/\/#define\ PING_CMD/#define\ PING_CMD/' config/general.h

          # 开启图片
          sed -i 's/#undef CONSOLE_CMD/\/\* #undef CONSOLE_CMD \*\//; s/#undef CERT_CMD/\/\* #undef CERT_CMD \*\//' src/config/general.h
          grep -A 2 "CONSOLE_CMD" src/config/general.h
          
          # 开始编译
          make ${{ env.bindir }}/undionly.kpxe ${{ env.bindir }}/ipxe.pxe ${{ env.bindir }}/ipxe.usb EMBED=${{ inputs.autoexec_path }}
          cp ${{ env.bindir }}/undionly.kpxe /workdir/
          cp ${{ env.bindir }}/ipxe.pxe /workdir/
          cp ${{ env.bindir }}/ipxe.usb /workdir/
          cp ${{ inputs.autoexec_path }} /workdir/
          echo "构建完成，验证文件:"
          ls -lh /workdir/undionly.kpxe /workdir/ipxe.pxe /workdir/ipxe.usb /workdir/${{ inputs.autoexec_path }}
          
          echo "当前工作目录: $(pwd)"
          ls -la
          ls -la

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-${{ matrix.arch }}
          path: |
            /workdir/undionly.kpxe
            /workdir/ipxe.pxe
            /workdir/ipxe.usb
            /workdir/${{ inputs.autoexec_path }}

      - name: 生成 release tag
        id: tag
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          cat >> release.txt <<EOF
          1、本固件为自动编译
          2、发行版中只提供完整的固件
          -- Build by Cnbbx @ with Github Action on $(date +"%Y.%m.%d-%H%M")
          🚀 Auto build | 自动编译
          EOF

      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        if: github.event_name == 'push'
        with:
          retain_days: 0
          keep_minimum_runs: 3

      - name: 移除老的 Releases
        uses: dev-drprasad/delete-older-releases@master
        if: github.event_name == 'push'
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
