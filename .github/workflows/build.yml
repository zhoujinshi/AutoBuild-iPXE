name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      autoexec_path:
        description: '需要启动执行的脚本'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64

    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.arch }}
      options: --user root

    env:
      bindir: bin
      
    steps:
      - name: 创建工作目录
        working-directory: /
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          ls -la /

      - name: 检出 autoexec.ipxe
        uses: actions/checkout@v4
        with:
          path: autoexec-config
          repository: zhoujinshi/ipxe
          ref: master
          fetch-depth: 0

      - name: 检出 iPXE 源码
        uses: actions/checkout@v4
        with:
          path: ipxe-source
          repository: ipxe/ipxe
          ref: master
          fetch-depth: 0

      - name: 复制代码到工作目录
        run: |
          cp -r autoexec-config /workdir/
          cp -r ipxe-source /workdir/
          ls -la /workdir/

      - name: 准备 autoexec.ipxe
        working-directory: /workdir/autoexec-config
        run: |
          cd /workdir/ipxe-source
          echo "当前工作目录: $(pwd)"
          ls -la
          cd /workdir/autoexec-config
          echo "当前工作目录: $(pwd)"
          ls -la
          echo "尝试访问文件: /workdir/autoexec-config/${{ inputs.autoexec_path }}"
          
          if [ -f "/workdir/autoexec-config/${{ inputs.autoexec_path }}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "/workdir/autoexec-config/${{ inputs.autoexec_path }}" /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '/workdir/autoexec-config/${{ inputs.autoexec_path }}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: /workdir/ipxe-source/src
        run: |
          echo "当前工作目录: $(pwd)"
          make clean
          make ${{ env.bindir }}/undionly.kpxe ${{ env.bindir }}/ipxe.pxe EMBED=${{ inputs.autoexec_path }}
          cp ${{ env.bindir }}/undionly.kpxe /workdir/
          cp ${{ env.bindir }}/ipxe.pxe /workdir/
          cp ${{ env.bindir }}/${{ inputs.autoexec_path }} /workdir/
          echo "构建完成，验证文件:"
          ls -lh /workdir/undionly.kpxe /workdir/ipxe.pxe /workdir/${{ inputs.autoexec_path }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          working-directory: /workdir/
          name: ipxe-${{ matrix.arch }}
          path: |
            undionly.kpxe
            ipxe.pxe
            ${{ inputs.autoexec_path }}

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          working-directory: /workdir/
          files: |
            undionly.kpxe
            ipxe.pxe
            ${{ inputs.autoexec_path }}
          tag_name: ${{ matrix.arch }}
          name: ${{ matrix.arch }}
          draft: false
          prerelease: false

      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 3

      - name: 移除老的 Release
        uses: sgpublic/delete-release-action@v1.1
        with:
          release-drop: true
          release-keep-count: 2
          release-drop-tag: true
          pre-release-drop: true
          pre-release-keep-count: -1
          pre-release-drop-tag: true
          draft-drop: true
          draft-drop-count: -1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
