name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      autoexec_path:
        description: '需要启动执行的脚本'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i386
          - arch: x86_64

    container:
      image: ghcr.io/netbootxyz/builder:latest
      options: --user root

    env:
      bindir: >-
        ${{ matrix.arch == 'i386' && 'bin' || 'bin-x86_64-pcbios' }}
      
    steps:
      - name: 创建工作目录
        working-directory: /
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          sudo mkdir -p /workdir/bin
          sudo chown $USER:$GROUPS /workdir/bin
          ls -la /

      - name: 检出 autoexec.ipxe
        uses: actions/checkout@v4
        with:
          path: autoexec-config
          repository: zhoujinshi/ipxe
          ref: master
          fetch-depth: 0

      - name: 检出 iPXE 源码
        uses: actions/checkout@v4
        with:
          path: ipxe-source
          repository: netbootxyz/ipxe
          ref: master
          fetch-depth: 0

      - name: 复制代码到工作目录
        run: |
          cp -r autoexec-config /workdir/
          cp -r ipxe-source /workdir/
          ls -la /workdir/

      - name: 准备 autoexec.ipxe
        working-directory: /workdir/autoexec-config
        run: |
          cd /workdir/ipxe-source
          echo "当前工作目录: $(pwd)"
          ls -la
          cd /workdir/autoexec-config
          echo "当前工作目录: $(pwd)"
          ls -la
          echo "尝试访问文件: /workdir/autoexec-config/${{ inputs.autoexec_path }}"
          
          if [ -f "/workdir/autoexec-config/${{ inputs.autoexec_path }}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "/workdir/autoexec-config/${{ inputs.autoexec_path }}" /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la /workdir/ipxe-source/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '/workdir/autoexec-config/${{ inputs.autoexec_path }}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: /workdir/ipxe-source/src
        run: |
          echo "当前工作目录: $(pwd)"
          make clean
          
          # 开始编译
          make ${{ env.bindir }}/10ec8139.rom \
               ${{ env.bindir }}/8086100e.mrom \
               ${{ env.bindir }}/ipxe.dsk \
               ${{ env.bindir }}/ipxe.iso \
               ${{ env.bindir }}/ipxe.lkrn \
               ${{ env.bindir }}/ipxe.pxe \
               ${{ env.bindir }}/ipxe.usb \
               ${{ env.bindir }}/ipxe-legacy.lkrn \
               ${{ env.bindir }}/ipxe-legacy.pxe \
               ${{ env.bindir }}/undionly.kpxe \
               ${{ env.bindir }}/errors \
               EMBED=${{ inputs.autoexec_path }}
          cp ${{ env.bindir }}/10ec8139.rom /workdir/bin/${{ matrix.arch }}-10ec8139.rom
          cp ${{ env.bindir }}/8086100e.mrom /workdir/bin/${{ matrix.arch }}-8086100e.mrom
          cp ${{ env.bindir }}/ipxe.dsk /workdir/bin/${{ matrix.arch }}-ipxe.dsk
          cp ${{ env.bindir }}/ipxe.iso /workdir/bin/${{ matrix.arch }}-ipxe.iso
          cp ${{ env.bindir }}/ipxe.lkrn /workdir/bin/${{ matrix.arch }}-ipxe.lkrn
          cp ${{ env.bindir }}/ipxe.pxe /workdir/bin/${{ matrix.arch }}-ipxe.pxe
          cp ${{ env.bindir }}/ipxe.usb /workdir/bin/${{ matrix.arch }}-ipxe.usb
          cp ${{ env.bindir }}/ipxe-legacy.lkrn /workdir/bin/${{ matrix.arch }}-ipxe-legacy.lkrn
          cp ${{ env.bindir }}/ipxe-legacy.pxe /workdir/bin/${{ matrix.arch }}-ipxe-legacy.pxe
          cp ${{ env.bindir }}/undionly.kpxe /workdir/bin/${{ matrix.arch }}-undionly.kpxe
          cp ${{ inputs.autoexec_path }} /workdir/bin/${{ matrix.arch }}-${{ inputs.autoexec_path }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-${{ matrix.arch }}
          path: |
            /workdir/bin/*

      - name: 生成 release tag
        id: tag
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          cat >> release.txt <<EOF
          1、本固件为自动编译
          2、发行版中只提供完整的固件
          -- Build by Cnbbx @ with Github Action on $(date +"%Y.%m.%d-%H%M")
          🚀 Auto build | 自动编译
          EOF

      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        if: github.event_name == 'push'
        with:
          retain_days: 0
          keep_minimum_runs: 3

      - name: 移除老的 Releases
        uses: dev-drprasad/delete-older-releases@master
        if: github.event_name == 'push'
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
