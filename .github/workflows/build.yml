name: 构建 iPXE 并嵌入自动执行脚本

on:
  workflow_dispatch:
    inputs:
      ipxe_repo:
        description: 'iPXE 仓库'
        required: true
        default: 'ipxe/ipxe'

      autoexec_path:
        description: 'autoexec.ipxe 在仓库中的路径'
        required: false
        default: 'autoexec.ipxe'

jobs:
  build:
    name: 构建 / ${{ matrix.arch }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: pcbios
            builder_arch: x86_64
            output_dir: bin-x86_64-pcbios

    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.builder_arch }}
      options: --user root

    env:
      IPXE_SRC_DIR: ipxe-source
      AUTOEXEC_SRC_DIR: autoexec-config

    steps:
      - name: 检查空间使用情况
        working-directory: /
        run: |
          echo "警告⚠"
          echo -e "-------------- ------------CPU信息------------------------------------------\n"
          echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "-------------------------------内存信息-------------------------------------------"
          echo "已安装内存详细信息："
          sudo lshw -short -C memory | grep GiB
          echo -e "\n"
          echo "-----------------------------硬盘信息---------------------------------------------"
          echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
          echo "硬盘详情："
          df -Th

      - name: 检出 iPXE 源码
        working-directory: /
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          fetch-depth: 0
          path: ${{ env.IPXE_SRC_DIR }}

      - name: 检出 autoexec.ipxe
        working-directory: /
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ipxe_repo }}
          ref: master
          fetch-depth: 0
          path: ${{ env.AUTOEXEC_SRC_DIR }}

      - name: 准备 autoexec.ipxe
        working-directory: /${{ env.AUTOEXEC_SRC_DIR }}
        run: |
          echo "当前工作目录: $(pwd)"
          echo "尝试访问文件: ${{ inputs.autoexec_path }}"
          
          if [ -f "${{ inputs.autoexec_path }}" ]; then
            echo "找到文件，正在复制到 iPXE 源码目录..."
            cp "${{ inputs.autoexec_path }}" /${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
            echo "复制完成，验证目标文件:"
            ls -la /${{ env.IPXE_SRC_DIR }}/src/${{ inputs.autoexec_path }}
          else
            echo "错误: 未找到 autoexec.ipxe 在 '${{ inputs.autoexec_path }}'"
            exit 1
          fi

      - name: 构建 iPXE
        working-directory: /${{ env.IPXE_SRC_DIR }}/src
        run: |
          echo "当前工作目录: $(pwd)"
          make clean
          make EMBED=${{ inputs.autoexec_path }} \
               ${{ matrix.output_dir }}/undionly.kpxe \
               ${{ matrix.output_dir }}/ipxe.pxe

      - name: 上传构建产物
        working-directory: /${{ env.IPXE_SRC_DIR }}/src
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-${{ matrix.arch }}-${{ matrix.target }}
          path: |
            ${{ matrix.output_dir }}/*.kpxe
            ${{ matrix.output_dir }}/*.pxe
            ${{ inputs.autoexec_path }}
            
      - name: 移除老的 workflow runs
        uses: zhoujinshi/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: 移除老的 Releases
        uses: dev-drprasad/delete-older-releases@master
        if: (inputs.UPLOAD_RELEASE == true || inputs.UPLOAD_RELEASE == '') && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
